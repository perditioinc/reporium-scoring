name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/ -v --timeout=30

  notify-on-failure:
    needs: test
    if: failure()
    uses: perditioinc/git-devkit/.github/workflows/on-test-failure.yml@main
    with:
      branch: ${{ github.ref_name }}
      sha: ${{ github.sha }}
      run_id: ${{ github.run_id }}
      repo: ${{ github.repository }}
    permissions:
      issues: write
